<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Produtos - SCP</title>
  <link rel="stylesheet" href="../CSS/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <div class="navbar">
    <div class="dropdown">
      <button class="dropbtn">Cadastros ▼</button>
      <div class="dropdown-content">
        <a href="categorias.html">Categorias</a>
        <a href="clientes.html">Clientes</a>
        <a href="produtos.html">Produtos</a>
        <a href="orcamentos.html">Orçamentos</a>
        <a href="usuarios.html">Usuários</a>
      </div>
    </div>
    <a href="menu.html">Sair</a>
  </div>

  <div class="container">

    <div class="card">
      <h1>Cadastro de Produtos</h1>

      <!-- Área de mensagem de feedback -->
      <div id="mensagem" class="mensagem"></div>

      <form id="form-produto">
        <!-- Campo oculto para guardar o ID -->
        <input type="hidden" id="produto-id">

        <label for="categoria-codigo">Categoria do produto:</label>
        <select id="categoria-codigo" required>
          <option value="">Selecionar</option>
        </select>

        <label for="descricao-simples">Descrição:</label>
        <input type="text" id="descricao-simples" maxlength="50" placeholder="Digite a descrição do produto" required>

        <label for="descricao-completa">Observação</label>
        <textarea id="descricao-completa" rows="3" maxlength="300"
          placeholder="Informações adicionais do produto (opcional)"></textarea>

        <label for="valor-venda">Valor de venda (R$):</label>
        <input type="number" step="0.01" min="0" id="valor-venda" placeholder="0.00" required>

        <label for="status-produto">Status:</label>
        <select id="status-produto" required>
          <option value="ATIVO">Ativo</option>
          <option value="INATIVO">Inativo</option>
        </select>

        <div class="form-buttons">
          <button type="submit" id="btn-salvar">Salvar</button>
          <button type="reset" class="btn-limpar" id="btn-cancelar">Limpar</button>
        </div>
      </form>
    </div>

    <div class="card">
      <h2>Produtos Cadastrados</h2>

      <div style="display: flex; gap: 10px; margin-bottom: 10px;">
        <div class="search-container" style="flex: 1;">
          <i class="fas fa-search"></i>
          <input type="text" id="campo-busca" placeholder="Buscar por descrição ou categoria...">
        </div>
        <select id="filtro-status" style="width: 140px;">
          <option value="">Todos</option>
          <option value="ativo">Ativos</option>
          <option value="inativo">Inativos</option>
        </select>
      </div>
      <table>
        <thead>
          <tr>
            <th>Código</th>
            <th>Categoria</th>
            <th>Descrição</th>
            <th>Valor</th>
            <th>Data Cadastro</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabela-produtos-corpo">
        </tbody>
      </table>
    </div>

  </div>

  <footer>
    SCP — Sistema de Controle de Produtos e Orçamentos &copy; 2026
  </footer>

  <script src="../JS/cadastro-produtos.js"></script>
</body>

</html>
