<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Produtos - SCP</title>
  <link rel="stylesheet" href="../CSS/styles.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <div class="navbar">
    <div class="dropdown">
      <button class="dropbtn">Cadastros ▼</button>
      <div class="dropdown-content">
        <a href="categorias.html">Categoria</a>
        <a href="clientes.html">Clientes</a>
        <a href="produtos.html">Produtos</a>
        <a href="orcamentos.html">Orçamentos</a>
        <a href="usuarios.html">Usuários</a>
      </div>
    </div>
    <a href="menu.html">Sair</a>
  </div>

  <div class="container">

    <div class="card">
      <h1 id="titulo-formulario">Cadastro de Produtos</h1>

      <form id="form-produto">
        <input type="hidden" id="produto-id">

        <label for="categoria-codigo">Categoria do produto *</label>
        <select id="categoria-codigo" required>
          <option value="">Selecionar</option>
        </select>

        <label for="descricao-simples">Descrição *</label>
        <input type="text" id="descricao-simples" maxlength="50" placeholder="Digite a descrição do produto" required>

        <label for="descricao-completa">Observação</label>
        <textarea id="descricao-completa" rows="4" maxlength="300"
          placeholder="Digite as observações do produto"></textarea>

        <label for="valor-venda">Valor de venda *</label>
        <input type="number" step="0.01" min="0" id="valor-venda" placeholder="0.00" required>

        <label for="status-produto">Status *</label>
        <select id="status-produto" required>
          <option value="ATIVO" selected>Ativo</option>
          <option value="INATIVO">Inativo</option>
        </select>

        <div class="form-buttons">
          <button type="submit" id="btn-salvar">Salvar</button>
          <button type="reset" class="btn-limpar" id="btn-cancelar">Limpar</button>
        </div>
      </form>
    </div>

    <div class="card">
      <h2>Produtos Cadastrados</h2>

      <table>
        <thead>
          <tr>
            <th>Código</th>
            <th>Categoria</th>
            <th>Descrição</th>
            <th>Valor</th>
            <th>Data Cadastro</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabela-produtos-corpo">
          <tr>
            <td>1</td>
            <td>Mecânico</td>
            <td>CHAPA METALICA</td>
            <td>R$ 106,22</td>
            <td>18/02/2026</td>
            <td><span class="status-badge ativo">Ativo</span></td>
            <td>
              <button class="btn-editar">Editar</button>
              <button class="btn-excluir">Excluir</button>
            </td>
          </tr>
          <tr>
            <td>2</td>
            <td>Mecânico</td>
            <td>FOLHA METALICA</td>
            <td>R$ 10,88</td>
            <td>18/02/2026</td>
            <td><span class="status-badge ativo">Ativo</span></td>
            <td>
              <button class="btn-editar">Editar</button>
              <button class="btn-excluir">Excluir</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

</body>

</html>
