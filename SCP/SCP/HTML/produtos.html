<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Produtos</title>
  <link rel="stylesheet" href="/CSS/styles.css">
</head>
<body>

  <div class="navbar">
    <div class="dropdown">
      <button class="dropbtn">Cadastros ▼</button>
      <div class="dropdown-content">
        <a href="categorias.html">Categoria</a>
        <a href="clientes.html">Clientes</a>
        <a href="produtos.html">Produtos</a>
        <a href="usuarios.html">Usuários</a>
      </div>
    </div>

    <a href="menu.html">Sair</a>
  </div>

  <div class="container">
    <div class="card">
      <h1>Cadastro de Produtos</h1>

      <form action="#" method="post">
        <label for="codigo-produto">Código do produto</label>
        <input type="text" id="codigo-produto" name="codigo-produto" placeholder="Digite o código do produto" required>

        <label for="descricao-simples">Descrição simples</label>
        <input type="text" id="descricao-simples" name="descricao-simples" placeholder="Digite a descrição simples" required>

        <label for="descricao-completa">Descrição completa</label>
        <textarea id="descricao-completa" name="descricao-completa" rows="5" placeholder="Digite a descrição completa"></textarea>

        <label for="valor-venda">Valor de venda</label>
        <input type="number" step="0.01" min="0" id="valor-venda" name="valor-venda" placeholder="0.00" required>

        <label for="categoria-codigo">Categoria do produto</label>
        <select name="categoria-produto" id="categoria-codigo" required>
          <option value="">Selecionar</option>
          <option value="eletronico">Eletrônico</option>
          <option value="mecanico">Mecânico</option>
          <option value="informatica">Informática</option>
        </select>

        <button type="submit">Salvar</button>
        <button type="reset" class="btn-limpar">Limpar</button>
      </form>
    </div>

    <div class="card">
      <h2>Produtos Cadastrados</h2>

      <table>
        <thead>
          <tr>
            <th>Código</th>
            <th>Produto</th>
            <th>Categoria</th>
            <th>Valor</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>001</td>
            <td>Mouse sem fio</td>
            <td>Informática</td>
            <td>R$ 59,90</td>
          </tr>
          <tr>
            <td>002</td>
            <td>Fone Bluetooth</td>
            <td>Eletrônico</td>
            <td>R$ 129,90</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</body>
</html>
