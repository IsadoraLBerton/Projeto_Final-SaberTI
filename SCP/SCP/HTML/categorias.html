<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Categorias - SCP</title>
  <link rel="stylesheet" href="../CSS/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <!-- Barra de navegação -->
  <div class="navbar">
    <div class="dropdown">
      <button class="dropbtn">Cadastros ▼</button>
      <div class="dropdown-content">
        <a href="categorias.html">Categorias</a>
        <a href="clientes.html">Clientes</a>
        <a href="orcamentos.html">Orçamentos</a>
        <a href="produtos.html">Produtos</a>
        <a href="usuarios.html">Usuários</a>
      </div>
    </div>
    <a href="menu.html">Sair</a>
  </div>

  <div class="container">

    <!-- Card do formulário de cadastro -->
    <div class="card">
      <h1>Cadastro de Categorias</h1>

      <!-- Área onde aparece a mensagem de sucesso ou erro -->
      <div id="mensagem" class="mensagem"></div>

      <form id="form-categoria">
        <!-- Campo oculto que guarda o ID quando estamos editando -->
        <input type="hidden" id="codigo-categoria">

        <label for="descricao-categoria">Descrição da categoria *</label>
        <input type="text" id="descricao-categoria" maxlength="50"
          placeholder="Ex: Informática, Escritório, Alimentos..." required>

        <div class="form-buttons">
          <button type="submit" id="btn-salvar">Salvar</button>
          <button type="reset" class="btn-limpar">Limpar</button>
        </div>
      </form>
    </div>

    <!-- Card da listagem -->
    <div class="card">
      <h2>Categorias Cadastradas</h2>

      <input type="text" id="campo-busca" placeholder="🔍 Buscar categoria..." style="margin-bottom: 10px;">

      <table>
        <thead>
          <tr>
            <th>Código</th>
            <th>Descrição da Categoria</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabela-categorias-corpo">
        </tbody>
      </table>
    </div>

  </div>

  <footer>
    SCP — Sistema de Controle de Produtos e Orçamentos &copy; 2026
  </footer>

  <script src="../JS/cadastro-categorias.js"></script>
</body>

</html>
