<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Categoria</title>
  <link rel="stylesheet" href="/CSS/styles.css">
</head>
<body>

  <div class="navbar">
    <div class="dropdown">
      <button class="dropbtn">Cadastros ▼</button>
      <div class="dropdown-content">
        <a href="categorias.html">Categoria</a>
        <a href="clientes.html">Clientes</a>
        <a href="produtos.html">Produtos</a>
        <a href="usuarios.html">Usuários</a>
      </div>
    </div>

    <a href="menu.html">Sair</a>
  </div>

  <div class="container">
    <div class="card">
      <h1>Cadastro de Categoria</h1>

      <form action="#" method="post">
        <label for="nomeCategoria">Nome da categoria</label>
        <input type="text" id="nomeCategoria" name="nomeCategoria" placeholder="Digite o nome da categoria" required>

        <label for="descricao">Descrição</label>
        <textarea id="descricao" name="descricao" rows="4" placeholder="Digite uma descrição"></textarea>

        <button type="submit">Salvar</button>
        <button type="reset" class="btn-limpar">Limpar</button>
      </form>
    </div>

    <div class="card">
      <h2>Categorias Cadastradas</h2>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Categoria</th>
            <th>Descrição</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td>Eletrônicos</td>
            <td>Produtos eletrônicos em geral</td>
          </tr>
          <tr>
            <td>2</td>
            <td>Informática</td>
            <td>Equipamentos de informática</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</body>
</html>
