<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRUD de Categorias</title>
  <link rel="stylesheet" href="../CSS/styles.css">
</head>

<body>

  <div class="navbar">
    <div class="dropdown">
      <button class="dropbtn">Cadastros ▼</button>
      <div class="dropdown-content">
        <a href="categorias.html">Categoria</a>
        <a href="clientes.html">Clientes</a>
        <a href="orcamentos.html">Orçamentos</a>
        <a href="produtos.html">Produtos</a>
        <a href="usuarios.html">Usuários</a>
      </div>
    </div>
    <a href="menu.html">Sair</a>
  </div>

  <div class="container">

    <div class="card">
      <h1 id="titulo-formulario">Cadastro de Categorias</h1>

      <form id="form-categoria">
        <input type="hidden" id="codigo-categoria">

        <label for="descricao-categoria">Descrição da categoria *</label>
        <input type="text" id="descricao-categoria" maxlength="50"
          placeholder="Ex: Informática, Escritório, Alimentos..." required>

        <div class="form-buttons">
          <button type="submit">Salvar</button>
          <button type="reset" class="btn-limpar">Limpar</button>
        </div>
      </form>
    </div>

    <div class="card">
      <h2>Categorias Cadastradas</h2>

      <table>
        <thead>
          <tr>
            <th>Código</th>
            <th>Descrição da Categoria</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td>Informática</td>
            <td>
              <button class="btn-editar">Editar</button>
              <button class="btn-excluir">Excluir</button>
            </td>
          </tr>
          <tr>
            <td>2</td>
            <td>Escritório</td>
            <td>
              <button class="btn-editar">Editar</button>
              <button class="btn-excluir">Excluir</button>
            </td>
          </tr>
          <tr>
            <td>3</td>
            <td>Alimentos</td>
            <td>
              <button class="btn-editar">Editar</button>
              <button class="btn-excluir">Excluir</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</body>

</html>
