<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esqueci minha senha</title>
  <link rel="stylesheet" href="/CSS/styles.css">
</head>
<body class="login-page">

  <div class="login-area">
    <div class="login-texto">
      <h1>Recuperar senha</h1>
      <p>Informe seu e-mail e cadastre uma nova senha para voltar a acessar o sistema.</p>
    </div>

    <div class="login-card">
      <form action="login.html" method="get">
        <input type="email" id="email-login" name="email-login" placeholder="E-mail" required>
        <input type="password" id="nova-senha" name="nova-senha" placeholder="Nova senha" required>
        <input type="password" id="confirmar-senha" name="confirmar-senha" placeholder="Confirmar nova senha" required>

        <button type="submit" class="btn-login">Trocar senha</button>

        <a href="login.html" class="login-link">Voltar para o login</a>

        <hr class="linha">

        <button type="reset" class="btn-cancelar">Cancelar</button>
      </form>
    </div>
  </div>

</body>
</html>
