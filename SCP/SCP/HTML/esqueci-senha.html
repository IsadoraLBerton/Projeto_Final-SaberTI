<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir Senha - SCP</title>
  <link rel="stylesheet" href="../CSS/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="login-page">

  <div class="login-area">

    <div class="login-texto">
      <h1>SCP</h1>
      <p>Redefina sua senha para voltar a acessar o sistema com segurança.</p>
    </div>

    <div class="login-card">
      <div id="mensagem" class="mensagem"></div>

      <form id="form-esqueci-senha">
        <label for="usuario-recuperacao">Usuário</label>
        <input type="text" id="usuario-recuperacao" placeholder="Digite seu usuário" required autocomplete="username">

        <label for="nome-recuperacao">Nome completo</label>
        <input type="text" id="nome-recuperacao" placeholder="Digite seu nome completo" required autocomplete="name">

        <label for="nova-senha">Nova senha</label>
        <input type="password" id="nova-senha" placeholder="Digite a nova senha" required autocomplete="new-password">

        <label for="confirmar-senha">Confirmar nova senha</label>
        <input type="password" id="confirmar-senha" placeholder="Confirme a nova senha" required
          autocomplete="new-password">

        <button type="submit" class="btn-login">Redefinir senha</button>

        <a href="index.html" class="login-link">Voltar ao login</a>

        <hr class="linha">

        <button type="reset" class="btn-cancelar">Cancelar</button>
      </form>
    </div>

  </div>

  <script src="../JS/esqueci-senha.js"></script>
</body>

</html>
