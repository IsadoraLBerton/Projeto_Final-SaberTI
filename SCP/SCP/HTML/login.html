<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="/CSS/styles.css">
</head>
<body class="login-page">

  <div class="login-area">
    <div class="login-texto">
      <h1>SCP</h1>
      <p>Acesse sua conta para gerenciar cadastros, produtos, categorias e usuários.</p>
    </div>

    <div class="login-card">
      <form action="menu.html" method="get">
        <input type="email" id="email-login" name="email-login" placeholder="E-mail" required>
        <input type="password" id="senha-login" name="senha-login" placeholder="Senha" required>

        <button type="submit" class="btn-login">Entrar</button>

        <a href="esqueci-senha.html" class="login-link">Esqueceu a senha?</a>

        <hr class="linha">

        <button type="reset" class="btn-cancelar">Cancelar</button>
      </form>
    </div>
  </div>

</body>
</html>
