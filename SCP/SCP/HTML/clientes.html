<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD de Clientes</title>
    <link rel="stylesheet" href="../CSS/styles.css">
</head>

<body>

    <div class="navbar">
        <div class="dropdown">
            <button class="dropbtn">Cadastros ▼</button>
            <div class="dropdown-content">
                <a href="categorias.html">Categoria</a>
                <a href="clientes.html">Clientes</a>
                <a href="orcamentos.html">Orçamentos</a>
                <a href="produtos.html">Produtos</a>
                <a href="usuarios.html">Usuários</a>
            </div>
        </div>
        <a href="menu.html">Sair</a>
    </div>

    <div class="container">

        <div class="card">
            <h1 id="titulo-formulario">Cadastro de Clientes</h1>

            <form id="form-cliente">
                <input type="hidden" id="codigo-cliente">

                <label for="tipo-cliente">Tipo de Cliente *</label>
                <select id="tipo-cliente" required>
                    <option value="">Selecionar</option>
                    <option value="F">Pessoa Física (F)</option>
                    <option value="J">Pessoa Jurídica (J)</option>
                </select>

                <label for="nome-cliente">Nome Completo *</label>
                <input type="text" id="nome-cliente" maxlength="100" placeholder="Digite o nome do cliente" required>

                <label for="cpf-cnpj-cliente">CPF / CNPJ *</label>
                <input type="text" id="cpf-cnpj-cliente" minlength="11" maxlength="14"
                    placeholder="Digite o CPF ou CNPJ" required>

                <div class="form-buttons">
                    <button type="submit">Salvar</button>
                    <button type="reset">Limpar</button>
                </div>
            </form>
        </div>

        <div class="card">
            <h2>Clientes Cadastrados</h2>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Tipo</th>
                        <th>Nome</th>
                        <th>CPF/CNPJ</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>F</td>
                        <td>José da Silva</td>
                        <td>943.051.830-56</td>
                        <td>
                            <button class="btn-editar">Editar</button>
                            <button class="btn-excluir">Excluir</button>
                        </td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>F</td>
                        <td>Pedro de Oliveira</td>
                        <td>802.202.930-07</td>
                        <td>
                            <button class="btn-editar">Editar</button>
                            <button class="btn-excluir">Excluir</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

</body>

</html>
