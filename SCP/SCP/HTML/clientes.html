<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Clientes - SCP</title>
  <link rel="stylesheet" href="../CSS/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <div class="navbar">
    <div class="dropdown">
      <button class="dropbtn">Cadastros ▼</button>
      <div class="dropdown-content">
        <a href="categorias.html">Categorias</a>
        <a href="clientes.html">Clientes</a>
        <a href="orcamentos.html">Orçamentos</a>
        <a href="produtos.html">Produtos</a>
        <a href="usuarios.html">Usuários</a>
      </div>
    </div>
    <a href="menu.html">Sair</a>
  </div>

  <div class="container">

    <div class="card">
      <h1>Cadastro de Clientes</h1>

      <div id="mensagem" class="mensagem"></div>

      <form id="form-cliente">

        <label for="tipo-cliente">Tipo de Cliente:</label>
        <select id="tipo-cliente" required>
          <option value="">Selecionar</option>
          <option value="F">Pessoa Física (F)</option>
          <option value="J">Pessoa Jurídica (J)</option>
        </select>

        <label for="nome-cliente">Nome Completo:</label>
        <input type="text" id="nome-cliente" maxlength="100" placeholder="Digite o nome do cliente" required>

        <label for="cpf-cnpj-cliente">CPF / CNPJ:</label>
        <input type="text" id="cpf-cnpj-cliente" minlength="11" maxlength="18"
          placeholder="Digite o CPF (000.000.000-00) ou CNPJ (00.000.000/0001-00)" required>

        <div class="form-buttons">
          <button type="submit">Salvar</button>
          <button type="reset" class="btn-limpar">Limpar</button>
        </div>
      </form>
    </div>

    <div class="card">
      <h2>Clientes Cadastrados</h2>

      <div class="search-container">
        <i class="fas fa-search"></i>
        <input type="text" id="campo-busca" placeholder="Buscar por nome ou CPF/CNPJ...">
      </div>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Tipo</th>
            <th>Nome</th>
            <th>CPF / CNPJ</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="lista-clientes">
        </tbody>
      </table>
    </div>

  </div>

  <footer>
    SCP — Sistema de Controle de Produtos e Orçamentos &copy; 2026
  </footer>

  <script src="../JS/cadastro-clientes.js"></script>
</body>

</html>
