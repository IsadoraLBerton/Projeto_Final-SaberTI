<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Usuários - SCP</title>
  <link rel="stylesheet" href="../CSS/styles.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <div class="navbar">
    <div class="dropdown">
      <button class="dropbtn">Cadastros ▼</button>
      <div class="dropdown-content">
        <a href="categorias.html">Categoria</a>
        <a href="clientes.html">Clientes</a>
        <a href="produtos.html">Produtos</a>
        <a href="orcamentos.html">Orçamentos</a>
        <a href="usuarios.html">Usuários</a>
      </div>
    </div>

    <a href="login.html">Sair</a>
  </div>

  <div class="container">
    <div class="card">
      <h1>Cadastro de Usuários</h1>

      <div id="mensagem" class="mensagem"></div>

      <form id="form-cadastro">

        <label for="nome-usuario">Nome completo</label>
        <input type="text" id="nome-usuario" placeholder="Digite o nome completo" required>

        <label for="login-usuario">Login (Usuário)</label>
        <input type="text" id="login-usuario" placeholder="Digite o login" required>

        <label for="senha-usuario">Senha</label>
        <input type="password" id="senha-usuario" placeholder="Digite a senha" required>
        
        <button type="submit">Salvar</button>
        <button type="reset" class="btn-limpar">Limpar</button>
      </form>
    </div>

    <div class="card">
      <h2>Usuários Cadastrados</h2>

      <table>
        <thead>
          <tr>
            <th>Código (ID)</th>
            <th>Nome</th>
            <th>Login</th>
            <th>Senha</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="lista-usuarios">
        </tbody>
      </table>
    </div>
  </div>

  <script src="../JS/cadastro-usuarios.js"></script>
</body>

</html>
