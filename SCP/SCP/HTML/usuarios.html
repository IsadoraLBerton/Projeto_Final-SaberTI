<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Usuários</title>
  <link rel="stylesheet" href="/CSS/styles.css">
</head>
<body>

  <div class="navbar">
    <div class="dropdown">
      <button class="dropbtn">Cadastros ▼</button>
      <div class="dropdown-content">
        <a href="categorias.html">Categoria</a>
        <a href="clientes.html">Clientes</a>
        <a href="produtos.html">Produtos</a>
        <a href="usuarios.html">Usuários</a>
      </div>
    </div>

    <a href="menu.html">Sair</a>
  </div>

  <div class="container">
    <div class="card">
      <h1>Cadastro de Usuários</h1>

      <form action="#" method="post">
        <label for="codigo-usuario">Código</label>
        <input type="text" id="codigo-usuario" name="codigo-usuario" placeholder="Digite o código" required>

        <label for="nome-usuario">Nome completo</label>
        <input type="text" id="nome-usuario" name="nome-usuario" placeholder="Digite o nome completo" required>

        <label for="login-usuario">Login</label>
        <input type="text" id="login-usuario" name="login-usuario" placeholder="Digite o login" required>

        <label for="email-usuario">E-mail</label>
        <input type="email" id="email-usuario" name="email-usuario" placeholder="Digite o e-mail" required>

        <label for="senha-usuario">Senha</label>
        <input type="password" id="senha-usuario" name="senha-usuario" placeholder="Digite a senha" required>

        <label for="tipo-usuario">Tipo de usuário</label>
        <select name="tipo-usuario" id="tipo-usuario" required>
          <option value="">Selecionar</option>
          <option value="administrador">Administrador</option>
          <option value="vendedor">Vendedor</option>
          <option value="estoque">Estoque</option>
        </select>

        <button type="submit">Salvar</button>
        <button type="reset" class="btn-limpar">Limpar</button>
      </form>
    </div>

    <div class="card">
      <h2>Usuários Cadastrados</h2>

      <table>
        <thead>
          <tr>
            <th>Código</th>
            <th>Nome</th>
            <th>Login</th>
            <th>E-mail</th>
            <th>Tipo</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>001</td>
            <td>João Silva</td>
            <td>joao.silva</td>
            <td>joao@email.com</td>
            <td>Administrador</td>
          </tr>
          <tr>
            <td>002</td>
            <td>Maria Souza</td>
            <td>maria.souza</td>
            <td>maria@email.com</td>
            <td>Vendedor</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</body>
</html>
